name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          DIST_DIR="dist/${TAG}"
          mkdir -p "${DIST_DIR}"

          build_one() {
            local target="$1"
            local out_name="$2"
            zig build -Doptimize=ReleaseFast -Dtarget="${target}" --prefix "${DIST_DIR}/.prefix-${out_name}"
            cp "${DIST_DIR}/.prefix-${out_name}/bin/ffast" "${DIST_DIR}/${out_name}"
            chmod +x "${DIST_DIR}/${out_name}"
          }

          build_one aarch64-macos ffast-darwin-arm64
          build_one x86_64-macos ffast-darwin-x86_64
          build_one aarch64-linux-gnu ffast-linux-arm64
          build_one x86_64-linux-gnu ffast-linux-x86_64

          cp install/install.sh "${DIST_DIR}/install.sh"
          chmod +x "${DIST_DIR}/install.sh"

          (
            cd "${DIST_DIR}"
            sha256sum \
              ffast-darwin-arm64 \
              ffast-darwin-x86_64 \
              ffast-linux-arm64 \
              ffast-linux-x86_64 \
              install.sh > checksums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Automated release artifacts.
          files: |
            dist/${{ github.ref_name }}/ffast-darwin-arm64
            dist/${{ github.ref_name }}/ffast-darwin-x86_64
            dist/${{ github.ref_name }}/ffast-linux-arm64
            dist/${{ github.ref_name }}/ffast-linux-x86_64
            dist/${{ github.ref_name }}/install.sh
            dist/${{ github.ref_name }}/checksums.txt
